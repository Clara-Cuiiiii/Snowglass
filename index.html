<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowGlass | 哈气雪花镜</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --accent-color: #a5d8ff;
            --panel-bg: rgba(20, 25, 30, 0.7);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #050505;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #container { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        video { display: none; }

        /* UI 面板 - 极简透明风格 */
        .ui-panel {
            position: absolute; top: 20px; right: 20px;
            width: 220px; padding: 18px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            color: white; z-index: 100;
        }
        .ui-header { font-size: 13px; font-weight: 600; margin-bottom: 15px; letter-spacing: 2px; color: var(--accent-color); }
        .control-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 11px; opacity: 0.9; }
        
        button {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); color: white;
            border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 12px;
        }
        button:hover { background: rgba(255,255,255,0.15); border-color: var(--accent-color); }

        .status-bar {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 8px 22px; background: var(--panel-bg); backdrop-filter: blur(8px);
            border-radius: 20px; color: #fff; font-size: 11px; z-index: 100;
            display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 1px;
        }

        /* 加载遮罩层 */
        .loading-overlay {
            position: fixed; inset: 0; background: #080808; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; transition: opacity 0.8s ease;
        }
        .loader-ring {
            width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="loader-ring"></div>
    <div style="margin-bottom: 10px; letter-spacing: 5px; font-weight: 200;">SNOWGLASS</div>
    <div id="status-text" style="font-size: 10px; opacity: 0.5;">正在连接设备与初始化 AI 模型...</div>
</div>

<div id="container">
    <video id="input_video" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    
    <div class="ui-panel">
        <div class="ui-header">SNOWGLASS CTRL</div>
        <div class="control-item">
            <span>雪花飘落效果</span>
            <input type="checkbox" id="check-snow" checked>
        </div>
        <div class="control-item">
            <span>左右对称擦拭</span>
            <input type="checkbox" id="check-mirror">
        </div>
        <button onclick="clearFog()">清空雾气 (C)</button>
        <div style="font-size: 10px; opacity: 0.4; margin-top: 15px; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            • 嘴部开合即产生“哈气”<br>
            • 食指停留1秒后开始擦拭<br>
            • 比划 ✌️ 触发雪花彩蛋
        </div>
    </div>

    <div class="status-bar">
        <span>哈气强度: <b id="breath-val">0</b>%</span>
        <span>追踪状态: <b id="track-status">准备中...</b></span>
    </div>
</div>

<script>
/** 1. 全局配置与状态 **/
const config = {
    fogMaxOpacity: 0.88,
    breathThreshold: 0.045, // 嘴部敏感度
    smoothFactor: 0.18,    // 擦拭平滑度
    eraseRadius: 50,
    snowCount: 65
};

let state = {
    isCameraReady: false,
    breathLevel: 0,
    handActive: false,
    handStartTime: 0,
    peaceTimer: 0,
    eggActive: false,
    lastX: null, lastY: null
};

/** 2. 画布与层级初始化 **/
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const ctx = canvasElement.getContext('2d');
const fogCanvas = document.createElement('canvas'); // 独立雾气层
const fctx = fogCanvas.getContext('2d');

function resize() {
    canvasElement.width = fogCanvas.width = window.innerWidth;
    canvasElement.height = fogCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function clearFog() {
    fctx.clearRect(0, 0, fogCanvas.width, fogCanvas.height);
}

/** 3. 雪花系统 **/
class Snowflake {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvasElement.width;
        this.y = Math.random() * -canvasElement.height;
        this.size = Math.random() * 2 + 0.8;
        this.speed = Math.random() * 0.8 + 0.3;
        this.wind = Math.random() * 0.4 - 0.2;
    }
    update() {
        this.y += this.speed;
        this.x += this.wind;
        if (this.y > canvasElement.height) this.reset();
    }
    draw(targetCtx) {
        targetCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        targetCtx.beginPath();
        targetCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        targetCtx.fill();
    }
}
let snowflakes = Array.from({length: config.snowCount}, () => new Snowflake());

/** 4. AI 追踪模型集成 **/
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });

// 处理手部结果
hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexTip = landmarks[8];
        const middleTip = landmarks[12];
        const ringTip = landmarks[16];
        
        const targetX = (1 - indexTip.x) * canvasElement.width;
        const targetY = indexTip.y * canvasElement.height;
        
        if (state.lastX === null) { state.lastX = targetX; state.lastY = targetY; }
        state.lastX += (targetX - state.lastX) * config.smoothFactor;
        state.lastY += (targetY - state.lastY) * config.smoothFactor;

        // ✌️ 判定
        const isPeace = (indexTip.y < landmarks[6].y && middleTip.y < landmarks[10].y && ringTip.y > landmarks[14].y);
        
        if (isPeace) {
            state.peaceTimer++;
            document.getElementById('track-status').innerText = "PEACE ✌️";
            if (state.peaceTimer > 35) triggerEgg();
        } else {
            state.peaceTimer = 0;
            if (!state.handActive) { state.handActive = true; state.handStartTime = Date.now(); }
            document.getElementById('track-status').innerText = "TRACKING 👋";
            // 延迟1秒确认后再进行擦拭
            if (Date.now() - state.handStartTime > 1000) {
                performErase(state.lastX, state.lastY);
            }
        }
    } else {
        state.handActive = false;
        state.lastX = state.lastY = null;
        document.getElementById('track-status').innerText = "NO HAND";
    }
});

// 处理人脸结果 (哈气)
faceMesh.onResults(results => {
    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        const upperLip = landmarks[13];
        const lowerLip = landmarks[14];
        const dist = Math.abs(upperLip.y - lowerLip.y);
        
        if (dist > config.breathThreshold) {
            state.breathLevel = Math.min(100, (dist - config.breathThreshold) * 1200);
            const mouthX = (1 - landmarks[13].x) * canvasElement.width;
            const mouthY = landmarks[13].y * canvasElement.height;
            addFog(mouthX, mouthY, state.breathLevel / 100);
        } else {
            state.breathLevel = 0;
        }
        document.getElementById('breath-val').innerText = Math.floor(state.breathLevel);
    }
});

/** 5. 交互绘制逻辑 **/
function addFog(x, y, strength) {
    const r = 180 * strength;
    const grad = fctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, `rgba(230, 245, 255, ${0.06 * strength})`);
    grad.addColorStop(1, 'rgba(230, 245, 255, 0)');
    fctx.fillStyle = grad;
    fctx.beginPath();
    fctx.arc(x, y, r, 0, Math.PI * 2);
    fctx.fill();
}

function performErase(x, y) {
    fctx.globalCompositeOperation = 'destination-out';
    const drawPoint = (cx, cy) => {
        const grad = fctx.createRadialGradient(cx, cy, 0, cx, cy, config.eraseRadius);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(0.7, 'rgba(255,255,255,0.2)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        fctx.fillStyle = grad;
        fctx.beginPath();
        fctx.arc(cx, cy, config.eraseRadius, 0, Math.PI * 2);
        fctx.fill();
    };
    drawPoint(x, y);
    if (document.getElementById('check-mirror').checked) drawPoint(canvasElement.width - x, y);
    fctx.globalCompositeOperation = 'source-over';
}

function triggerEgg() {
    if (state.eggActive) return;
    state.eggActive = true;
    for(let i=0; i<40; i++) {
        setTimeout(() => {
            const s = new Snowflake();
            s.speed *= 4;
            snowflakes.push(s);
        }, i * 40);
    }
    setTimeout(() => {
        state.eggActive = false;
        snowflakes = snowflakes.slice(0, config.snowCount);
    }, 6000);
}

/** 6. 渲染循环 **/
function render() {
    ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    if (state.isCameraReady) {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.translate(-canvasElement.width, 0);
        ctx.filter = 'blur(2px) brightness(0.65) saturate(0.7)';
        ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
        ctx.restore();
    }

    // 玻璃质感
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(0, 0, canvasElement.width, canvasElement.height);

    // 雾气合成
    ctx.globalAlpha = config.fogMaxOpacity;
    ctx.drawImage(fogCanvas, 0, 0);
    ctx.globalAlpha = 1.0;

    // 雪花
    if (document.getElementById('check-snow').checked) {
        snowflakes.forEach(s => { s.update(); s.draw(ctx); });
    }

    requestAnimationFrame(render);
}

/** 7. 启动过程 **/
const camera = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
        await faceMesh.send({image: videoElement});
    },
    width: 1280, height: 720
});

// 自动启动并处理权限
window.onload = () => {
    camera.start().then(() => {
        state.isCameraReady = true;
        const loader = document.getElementById('loading');
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 800);
        render();
    }).catch(err => {
        document.getElementById('status-text').innerText = "请检查摄像头权限并重试 (" + err.name + ")";
    });
};

// 快捷键支持
window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') addFog(canvasElement.width/2, canvasElement.height/2, 0.8);
    if (e.code === 'KeyC') clearFog();
});
</script>
</body>
</html>
